<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightweight Anime Watch Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }
    .shimmer-subtle {
      background: linear-gradient(90deg, #1f2937 25%, #2d3748 50%, #1f2937 75%) !important;
      background-size: 200% 100% !important;
      animation: shimmer 2s infinite linear !important;
    }
  </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

  <div class="max-w-5xl mx-auto p-6">
    <!-- Header -->
    <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
      <div>
        <h1 class="text-3xl font-extrabold text-indigo-400">AniStream Tracker</h1>
        <p class="text-sm text-gray-400">Track progress & live countdowns</p>
      </div>
      <div class="flex items-center gap-3">
        <span id="syncStatus"
          class="text-xs bg-gray-800 text-gray-500 px-3 py-1.5 rounded border border-gray-700/60 font-medium">
          ☁️ Supabase: Loading...
        </span>
        <span id="userDisplay" class="hidden text-xs text-gray-400 bg-gray-850 px-3 py-1.5 rounded border border-gray-700/60 font-medium"></span>
        <button id="headerAuthBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-3 py-1.5 rounded-lg font-bold cursor-pointer transition-all">
          🔑 Sign In
        </button>
      </div>
    </header>

    <!-- Search Section -->
    <section class="bg-gray-800 p-4 rounded-xl border border-gray-700 mb-8">
      <h2 class="text-lg font-bold mb-3 text-gray-200">Add Anime to Watchlist</h2>
      <div class="flex gap-2">
        <input id="searchInput" type="text" placeholder="Type anime name (e.g., Chainsaw Man)..."
          class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
        <button id="searchBtn"
          class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded font-semibold transition-colors">Search</button>
      </div>
      <div id="searchResults" class="grid grid-cols-1 md:grid-cols-2 gap-2 mt-4"></div>
    </section>

    <!-- Watchlist and Seasonal Section -->
    <section class="mt-8">
      <!-- Tab Controls & Dropdown -->
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div class="flex bg-gray-800 p-1 rounded-xl border border-gray-700/60 shrink-0">
          <button id="tabWatchlist" onclick="switchTab('watchlist')" class="px-4 py-2 text-xs md:text-sm font-bold rounded-lg transition-all bg-indigo-600 text-white cursor-pointer">
            📋 My Watchlist
          </button>
          <button id="tabSeasonal" onclick="switchTab('seasonal')" class="px-4 py-2 text-xs md:text-sm font-bold rounded-lg transition-all text-gray-400 hover:text-white cursor-pointer">
            ✨ Seasonal Shows
          </button>
        </div>
        
        <div id="seasonSelectContainer" class="hidden flex items-center gap-2">
          <span class="text-xs text-gray-400 font-semibold">Select Season:</span>
          <select id="seasonSelect" onchange="loadSeasonalAnime()" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500 cursor-pointer">
          </select>
        </div>
      </div>

      <!-- Watchlist Sections -->
      <div id="watchlistSections" class="space-y-8">
        <!-- Ready to Watch Section -->
        <div id="readyToWatchSection" class="hidden">
          <h3 class="text-lg font-bold mb-3 text-amber-400 flex items-center gap-2">
            🍿 Ready to Watch
            <span id="readyToWatchCount" class="text-xs bg-amber-500/20 text-amber-300 border border-amber-500/30 px-2.5 py-0.5 rounded-full font-bold">0</span>
          </h3>
          <div id="readyToWatchGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- Watchlist Section (Caught Up) -->
        <div id="upToDateSection">
          <h3 id="upToDateHeader" class="text-lg font-bold mb-3 text-gray-300 flex items-center gap-2">
            📅 Watchlist
            <span id="upToDateCount" class="text-xs bg-gray-800 text-gray-400 border border-gray-700/60 px-2.5 py-0.5 rounded-full font-bold">0</span>
          </h3>
          <div id="upToDateGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
      </div>

      <!-- Watchlist Empty State -->
      <div id="watchlistEmptyState" class="hidden text-center py-12 text-gray-500 text-sm">
        Your watchlist is empty. Search above or browse Seasonal Shows to add anime.
      </div>

      <!-- Seasonal Grid -->
      <div id="seasonalGrid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Javascript dynamic rendering injection target -->
      </div>

      <!-- Pagination controls for watchlist (placed below sections) -->
      <div id="watchlistPagination" class="hidden flex justify-center items-center gap-4 mt-6">
        <button id="prevWatchlistPage" onclick="changeWatchlistPage(-1)" class="bg-gray-800 hover:bg-gray-700 text-white border border-gray-700/60 text-xs px-3.5 py-2 rounded-lg font-bold transition-all cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed">
          ◀ Previous
        </button>
        <span id="watchlistPageNum" class="text-xs text-gray-400 font-semibold min-w-[80px] text-center">Page 1 of 1</span>
        <button id="nextWatchlistPage" onclick="changeWatchlistPage(1)" class="bg-gray-800 hover:bg-gray-700 text-white border border-gray-700/60 text-xs px-3.5 py-2 rounded-lg font-bold transition-all cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed">
          Next ▶
        </button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
  <script src="supabase.js"></script>
</body>
</html>
